<style>
/* ── Keyframes ────────────────────────────────────────────── */
@keyframes mjr-fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0);   }
}

/* ── Layout ───────────────────────────────────────────────── */
.mjr-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 40px;
  align-items: start;
  margin-top: 44px;
}

/* ── Tab list ─────────────────────────────────────────────── */
.mjr-tabs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: sticky;
  top: 24px;
}

.mjr-tab {
  display: grid;
  grid-template-columns: 48px 1fr;
  gap: 14px;
  align-items: start;
  padding: 18px 18px;
  background: #ffffff;
  border: 1.5px solid #e5e7eb;
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  font-family: 'Nunito Sans', Arial, Helvetica, sans-serif;
  transition:
    border-color .18s ease,
    background   .18s ease,
    box-shadow   .18s ease,
    transform    .14s ease;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
.mjr-tab:hover {
  border-color: #9ca3af;
  box-shadow: 0 2px 10px rgba(0,0,0,.08);
  transform: translateY(-1px);
}
.mjr-tab:active { transform: translateY(0); }
.mjr-tab[aria-selected="true"] {
  border-color: #b91c1c;
  background: #fff5f5;
  box-shadow: 0 0 0 1px #b91c1c, 0 4px 20px rgba(185,28,28,.12);
  transform: translateY(-1px);
}

/* Icon */
.mjr-tab-icon {
  width: 48px; height: 48px;
  border-radius: 10px;
  background: #f3f4f6;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .18s ease, color .18s ease;
  color: #6b7280;
}
.mjr-tab-icon svg { width: 22px; height: 22px; }
.mjr-tab[aria-selected="true"] .mjr-tab-icon {
  background: #b91c1c;
  color: #ffffff;
}

/* Text */
.mjr-tab-title {
  font-size: 15px;
  font-weight: 700;
  color: #0f0f0f;
  letter-spacing: -.015em;
  line-height: 1.25;
  margin-bottom: 5px;
  font-family: 'Nunito Sans', Arial, Helvetica, sans-serif;
}
.mjr-tab-desc {
  font-size: 14px;
  color: #6b7280;
  line-height: 1.55;
  font-weight: 400;
  font-family: 'Nunito Sans', Arial, Helvetica, sans-serif;
}
.mjr-tab[aria-selected="true"] .mjr-tab-desc { color: #991b1b; }

/* ── Right panel ──────────────────────────────────────────── */
.mjr-panel {
  background: #ffffff;
  border: 1.5px solid #e5e7eb;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
  transition: box-shadow .2s ease;
  min-height: 200px;
}
.mjr-panel:focus-within {
  box-shadow: 0 6px 32px rgba(0,0,0,.1), 0 2px 6px rgba(0,0,0,.05);
}

/* ── JotForm wrappers ─────────────────────────────────────── */
.mjr-form-wrap {
  display: none;
}
.mjr-form-wrap.mjr-active {
  display: block;
  animation: mjr-fadeSlideIn .3s ease forwards;
}

/* ── iframe heights — desktop default ────────────────────── */
.mjr-form-wrap iframe {
  width: 100%;
  border: none;
  display: block;
  height: 1000px;
}

/* Tablet: form fields start stacking */
@media (max-width: 935px) {
  .mjr-form-wrap iframe {
    height: 1280px;
  }
}

/* Tablet: form fields start stacking */
@media (max-width: 860px) {
  .mjr-form-wrap iframe {
    height: 920px;
  }
}
/* Mobile: fully stacked, more room needed */
@media (max-width: 595px) {
  .mjr-form-wrap iframe {
    height: 1400px;
  }
}

/* ── Disabled / locked tab ────────────────────────────────── */
.mjr-tab-locked {
  display: grid;
  grid-template-columns: 48px 1fr;
  gap: 14px;
  align-items: start;
  padding: 18px 18px;
  background: #f9fafb;
  border: 1.5px solid #e5e7eb;
  border-radius: 12px;
  text-align: left;
  cursor: not-allowed;
  opacity: .55;
  position: relative;
}
.mjr-tab-locked .mjr-tab-icon {
  width: 48px; height: 48px;
  border-radius: 10px;
  background: #e5e7eb;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: #9ca3af;
}
.mjr-tab-locked .mjr-tab-icon svg { width: 22px; height: 22px; }
.mjr-tab-locked .mjr-tab-title {
  font-size: 15px;
  font-weight: 700;
  color: #6b7280;
  letter-spacing: -.015em;
  line-height: 1.25;
  margin-bottom: 5px;
  font-family: 'Nunito Sans', Arial, Helvetica, sans-serif;
}
.mjr-tab-locked .mjr-tab-login {
  font-size: 14px;
  color: #6b7280;
  line-height: 1.55;
  font-weight: 400;
  font-family: 'Nunito Sans', Arial, Helvetica, sans-serif;
}
.mjr-lock-badge {
  position: absolute;
  top: 12px; right: 12px;
  width: 22px; height: 22px;
  background: #e5e7eb;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #9ca3af;
}
.mjr-lock-badge svg { width: 11px; height: 11px; }

/* ── Responsive layout ────────────────────────────────────── */
@media (max-width: 860px) {
  .mjr-layout {
    grid-template-columns: 1fr;
    gap: 24px;
  }
  .mjr-tabs {
    position: static;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .mjr-tab-locked {
    grid-column: 1 / -1;
  }
}
@media (max-width: 480px) {
  .mjr-tabs {
    grid-template-columns: 1fr;
  }
  .mjr-tab-locked {
    grid-column: auto;
  }
}
</style>

<!-- ── SCRIPT ─────────────────────────────────────────────── -->
<script>
(function () {
  var tabs = document.querySelectorAll('.mjr-tab[data-intent]');

  function activateTab(key) {
    var activeBtn = document.querySelector('.mjr-tab[data-intent="' + key + '"]');
    if (!activeBtn) return;

    tabs.forEach(function (btn) {
      btn.setAttribute('aria-selected', btn.dataset.intent === key ? 'true' : 'false');
    });

    document.querySelectorAll('.mjr-form-wrap').forEach(function (el) {
      if (el.dataset.jotform === key) {
        el.classList.remove('mjr-active');
        void el.offsetWidth;
        el.classList.add('mjr-active');
      } else {
        el.classList.remove('mjr-active');
      }
    });
  }

  tabs.forEach(function (btn) {
    btn.addEventListener('click', function () { activateTab(btn.dataset.intent); });
  });

  tabs.forEach(function (btn, i) {
    btn.addEventListener('keydown', function (e) {
      var all = Array.from(tabs);
      var next;
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') next = all[(i + 1) % all.length];
      else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') next = all[(i - 1 + all.length) % all.length];
      if (next) { next.focus(); activateTab(next.dataset.intent); e.preventDefault(); }
    });
  });

  activateTab('distributor');
}());
</script>
